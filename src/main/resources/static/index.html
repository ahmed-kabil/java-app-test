<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java App Status</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* background: linear-gradient(135deg, #1e1e2f 0%, #0f0f1a 100%); */
            background: linear-gradient(135deg, #395737 0%, #2c4b45 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        p {
            font-size: 1.1rem;
            color: #8892b0;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 15px;
            background: rgba(55, 123, 212, 0.2);
            color: #377bd4;
            border: 1px solid #377bd4;
            border-radius: 50px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from Java App</h1>
        <p>Your Spring Boot backend is active.</p>
        <div class="badge">Powered by OpenJDK 17</div>
    </div>
</body>
</html>
